name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  macos:
    name: macOS Qt build and tests
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Qt base
        run: brew install qtbase

      - name: Configure core
        run: cmake --preset core

      - name: Build core
        run: cmake --build --preset core

      - name: Test core
        run: ctest --preset core --timeout 60

      - name: Configure desktop
        run: cmake --preset desktop -DCMAKE_PREFIX_PATH="$(brew --prefix qtbase)"

      - name: Build desktop
        run: cmake --build --preset desktop

      - name: Test desktop
        run: ctest --test-dir build/desktop --output-on-failure --timeout 60

  linux:
    name: Linux Qt build and tests
    runs-on: ubuntu-latest
    env:
      QT_VERSION: 6.8.3
      QT_QPA_PLATFORM: offscreen

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libgl1-mesa-dev \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-render-util0 \
            libxcb-xinerama0 \
            libxcb-xkb1

      - name: Install Qt
        run: |
          python3 -m pip install --upgrade pip aqtinstall
          python3 -m aqt install-qt linux desktop "$QT_VERSION" linux_gcc_64 -O "$RUNNER_TEMP/Qt"
          echo "QT_PREFIX=$RUNNER_TEMP/Qt/$QT_VERSION/gcc_64" >> "$GITHUB_ENV"

      - name: Configure core
        run: cmake --preset core

      - name: Build core
        run: cmake --build --preset core

      - name: Test core
        run: ctest --preset core --timeout 60

      - name: Configure desktop
        run: cmake --preset desktop -DCMAKE_PREFIX_PATH="$QT_PREFIX"

      - name: Build desktop
        run: cmake --build --preset desktop

      - name: Test desktop
        run: ctest --test-dir build/desktop --output-on-failure --timeout 60

  windows:
    name: Windows Qt build and tests
    runs-on: windows-latest
    env:
      QT_VERSION: 6.8.3
      QT_QPA_PLATFORM: offscreen

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Qt
        shell: pwsh
        run: |
          python -m pip install --upgrade pip aqtinstall
          python -m aqt install-qt windows desktop $env:QT_VERSION win64_msvc2022_64 -O "$env:RUNNER_TEMP\Qt"
          "QT_PREFIX=$env:RUNNER_TEMP\Qt\$env:QT_VERSION\msvc2022_64" >> $env:GITHUB_ENV

      - name: Configure core
        shell: pwsh
        run: cmake -S . -B build/core-windows -DQCO_STUDIO_BUILD_APP=OFF -DQCO_STUDIO_BUILD_TESTS=ON

      - name: Build core
        shell: pwsh
        run: cmake --build build/core-windows --config Debug

      - name: Test core
        shell: pwsh
        run: ctest --test-dir build/core-windows -C Debug --output-on-failure --timeout 60

      - name: Configure desktop
        shell: pwsh
        run: cmake -S . -B build/desktop-windows -DQCO_STUDIO_BUILD_APP=ON -DQCO_STUDIO_BUILD_TESTS=ON -DCMAKE_PREFIX_PATH="$env:QT_PREFIX"

      - name: Build desktop
        shell: pwsh
        run: cmake --build build/desktop-windows --config Debug

      - name: Test desktop
        shell: pwsh
        run: ctest --test-dir build/desktop-windows -C Debug --output-on-failure --timeout 60
